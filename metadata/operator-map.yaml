schema_version: 1
description: >
  LFU operator-name mapping for ancillary result files. Future numerical
  tables should use computer_name as the machine-readable key. The
  analysis_label field records the intermediate label used in the calculation
  outputs, and latex gives the paper-facing label.

operators:
  - computer_name: "C_Q1_L_P"
    analysis_label: "ClqP[ll,ll,1,1]"
    latex: 'C_{lq}^{(+)[\ell\ell 11]}'
  - computer_name: "C_Q1_L_M"
    analysis_label: "ClqM[ll,ll,1,1]"
    latex: 'C_{lq}^{(-)[\ell\ell 11]}'
  - computer_name: "C_uR_L"
    analysis_label: "Clu[ll,ll,1,1]"
    latex: 'C_{lu}^{[\ell\ell 11]}'
  - computer_name: "C_uR_eR"
    analysis_label: "Ceu[ll,ll,1,1]"
    latex: 'C_{eu}^{[\ell\ell 11]}'
  - computer_name: "C_Q1_eR"
    analysis_label: "Cqe[1,1,ll,ll]"
    latex: 'C_{qe}^{[11\ell\ell]}'
  - computer_name: "C_dR_L"
    analysis_label: "Cld[ll,ll,1,1]"
    latex: 'C_{ld}^{[\ell\ell 11]}'
  - computer_name: "C_dR_eR"
    analysis_label: "Ced[ll,ll,1,1]"
    latex: 'C_{ed}^{[\ell\ell 11]}'

  - computer_name: "C_Q2_L_P"
    analysis_label: "ClqP[ll,ll,2,2]"
    latex: 'C_{lq}^{(+)[\ell\ell 22]}'
  - computer_name: "C_Q2_L_M"
    analysis_label: "ClqM[ll,ll,2,2]"
    latex: 'C_{lq}^{(-)[\ell\ell 22]}'
  - computer_name: "C_cR_L"
    analysis_label: "Clu[ll,ll,2,2]"
    latex: 'C_{lu}^{[\ell\ell 22]}'
  - computer_name: "C_cR_eR"
    analysis_label: "Ceu[ll,ll,2,2]"
    latex: 'C_{eu}^{[\ell\ell 22]}'
  - computer_name: "C_Q2_eR"
    analysis_label: "Cqe[2,2,ll,ll]"
    latex: 'C_{qe}^{[22\ell\ell]}'
  - computer_name: "C_sR_L"
    analysis_label: "Cld[ll,ll,2,2]"
    latex: 'C_{ld}^{[\ell\ell 22]}'
  - computer_name: "C_sR_eR"
    analysis_label: "Ced[ll,ll,2,2]"
    latex: 'C_{ed}^{[\ell\ell 22]}'

  - computer_name: "C_bL_L"
    analysis_label: "ClqP[ll,ll,3,3]"
    latex: 'C_{lq}^{(+)[\ell\ell 33]}'
  - computer_name: "C_bL_eR"
    analysis_label: "Cqe[3,3,ll,ll]"
    latex: 'C_{qe}^{[33\ell\ell]}'
  - computer_name: "C_bR_L"
    analysis_label: "Cld[ll,ll,3,3]"
    latex: 'C_{ld}^{[\ell\ell 33]}'
  - computer_name: "C_bR_eR"
    analysis_label: "Ced[ll,ll,3,3]"
    latex: 'C_{ed}^{[\ell\ell 33]}'
