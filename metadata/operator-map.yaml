schema_version: 1
description: >
  Canonical LFU operator-name mapping for ancillary result files. Future
  numerical tables should use profiler_name as the machine key, analysis_label
  as the intermediate label inherited from the profiler summaries, and
  plot_label_tex for plotting or paper-facing labels.
source:
  profiler_directory: "/Users/manuelmorales/flavourful_DY_PDF_SMEFT_agent/profiler_tests/lfu_hllhc_14tev_all_updated"
  summary_file: "grid_broadening_summary.csv"
name_chain:
  - "profiler_name"
  - "analysis_label"
  - "plot_label_tex"
units:
  wilson_coefficients: "TeV^-2"
lepton_structure:
  lfu: "lepton-flavour universal"

operators:
