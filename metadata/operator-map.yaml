    analysis_label: "ClqP[ll,ll,1,1]"
    latex: 'C_{lq}^{+[\ell\ell 11]}'
  - computer_name: "C_lq_m_ll11"
    analysis_label: "ClqM[ll,ll,1,1]"
    latex: 'C_{lq}^{-[\ell\ell 11]}'
  - computer_name: "C_lu_ll11"
    analysis_label: "Clu[ll,ll,1,1]"
    latex: 'C_{lu}^{[\ell\ell 11]}'
  - computer_name: "C_eu_ll11"
    analysis_label: "Ceu[ll,ll,1,1]"
    latex: 'C_{eu}^{[\ell\ell 11]}'
  - computer_name: "C_qe_11ll"
    analysis_label: "Cqe[1,1,ll,ll]"
    latex: 'C_{qe}^{[11\ell\ell]}'
  - computer_name: "C_ld_ll11"
    analysis_label: "Cld[ll,ll,1,1]"
    latex: 'C_{ld}^{[\ell\ell 11]}'
  - computer_name: "C_ed_ll11"
    analysis_label: "Ced[ll,ll,1,1]"
    latex: 'C_{ed}^{[\ell\ell 11]}'

